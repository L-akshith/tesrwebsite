version: '3.8'

services:
  # Load Balancer (Nginx)
  load_balancer:
    image: nginx:alpine
    container_name: lb_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend_1
      - frontend_2
      - backend
    networks:
      - app-network

  # Frontend Instance 1
  frontend_1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend_node_1
    expose:
      - "80"
    networks:
      - app-network

  # Frontend Instance 2
  frontend_2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend_node_2
    expose:
      - "80"
    networks:
      - app-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_api
    expose:
      - "5000"
    volumes:
      - backend-data:/usr/src/app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend-data:
